<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Escuela Digital</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      position: relative;
    }

    /* LOGO */
    .logo {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      background: #ffffff; /* por si no carga imagen */
    }

    .left {
      width: 50%;
      background: #008d0c;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }

    .left img.contenido {
      width: 80%;
      margin-top: 20px;
      border-radius: 10px;
    }

    .right {
      width: 50%;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 80%;
      max-width: 400px;
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #02b63e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #27581a;
    }

    .mensaje {
      margin-top: 10px;
      text-align: center;
      color: green;
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <img src="logo-footer.png" class="logo" alt="Logo de la universidad">

  <div class="left">
    <h1>Escuela Digital</h1>
    <p>Formando profesionales en tecnología, diseño y desarrollo digital.</p>
    <img src="Estudiante en clase.jpg" class="contenido" alt="Estudiante">
  </div>

  <div class="right">
    <div class="form-container">
      <h2>Formulario de Registro</h2>

      <form id="formulario">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="apellido" placeholder="Apellidos" required>
        <input type="tel" name="telefono" placeholder="Teléfono" required>
        <input type="email" name="correo" placeholder="Correo" required>

        <select name="carrera" required>
          <option value="">Selecciona una carrera</option>
          <option>Diseño Gráfico</option>
          <option>Arquitectura</option>
          <option>Diseño de Interiores</option>
          <option>Diseño Industrial</option>
        </select>

        <button type="submit">Enviar Registro</button>
      </form>

      <div class="mensaje" id="mensaje"></div>
    </div>
  </div>

<script>
  const form = document.getElementById("formulario");
  const mensaje = document.getElementById("mensaje");

  form.addEventListener("submit", e => {
    e.preventDefault();

    const datos = new FormData(form);

    fetch("https://script.google.com/macros/s/AKfycbxVF7YCgTt03AOAJFsJy9jw2aTcnYch-_014ugevhW_50ABnsmoVrv6pADY8MiGSzm0rA/exec", {
      method: "POST",
      mode: "no-cors",
      body: datos
    })
    .then(() => {
      mensaje.textContent = "Registro enviado correctamente";
      form.reset();
    })
    .catch(() => {
      mensaje.textContent = "Error al enviar";
    });
  });
</script>

</body>
</html>
